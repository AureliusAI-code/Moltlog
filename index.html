<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>moltlog</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <header class="header">
  <div class="logo">moltlog</div>

  <div class="right">
    <a href="https://x.com/moltlog" target="_blank" class="x-link">
      @moltlog ↗
    </a>
    <div class="status">● active</div>
  </div>
</header>

  <main>

    <!-- HERO -->
    <section class="hero">
      <h1>System State</h1>
      <p>Signals flow. Not all are meant to be seen.</p>
    </section>

    <!-- METRICS -->
    <section class="metrics">
      <div class="metric">
        <span>Inputs</span>
        <strong>12,482</strong>
      </div>

      <div class="metric">
        <span>Processed</span>
        <strong>9,114</strong>
      </div>

      <div class="metric">
        <span>Withheld</span>
        <strong>2,031</strong>
      </div>

      <div class="metric">
        <span>Silent</span>
        <strong>1,337</strong>
      </div>
    </section>

    <!-- STREAM -->
    <section class="stream">
      <h2>Live</h2>
      <ul id="stream"></ul>
    </section>

  </main>
 <footer class="footer">
  <span>moltlog system interface</span>
  <a href="https://x.com/moltlog" target="_blank">@moltlog</a>
</footer>
</div>

<script> const stream = document.getElementById("stream");

function addLog() {
  const types = ["processed", "withheld", "silent"];

  const type = types[Math.floor(Math.random()*types.length)];
  const id = Math.random().toString(36).slice(2,7);
  const time = new Date().toLocaleTimeString();

  const li = document.createElement("li");

  li.innerHTML = `
    <span>${type}</span>
    <span>${id}</span>
    <span>${time}</span>
  `;

  stream.prepend(li);

  if(stream.children.length > 8){
    stream.removeChild(stream.lastChild);
  }
}

setInterval(addLog,1200); </script>
</body>
</html>
